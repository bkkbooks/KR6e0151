body:
  text: 長水法孫智肱述吾祖賢首國師開宗判教經窮一代義絶百家解釋唐則天聖后朝所譯華嚴至十九卷大願未終奄然真寂清凉始登賢首法席傳習起信等義念學無常師遂人詢北禮法倣南求負笈四方撗經三學復趨賢首絳紗偶師遷化師之門徒雖高甲宗一慧苑慧英等輩續其餘藁皆不繫先古清涼遽發慨然之歎故別製新經疏二十卷或開為四十卷隨經演義鈔四十卷或開六十卷或開八十卷其疏鈔皆不違先師之意賢首門生實若星繁白眉青眼拔萃超群道契緣符心傳口授獨清涼一蟾孤朗大宋高僧傳義解科中藏師傳末云華嚴一宗付授澄觀國師諱也又師撰隨文手鑑一百卷華嚴綱要三卷法界玄鏡一卷鏡燈說文一卷三聖圓融觀一卷華嚴圓覺四分中觀等經律關脈三十餘部華嚴七處九會華藏界圖心鏡說文一卷大經了義備要三卷唐聖誕晨對御談經文兼一家祖述詩表箋章總八十餘卷斐相國云古錦純金隨器任用良以投機授法海應多波奧義雅談其歸一揆歷九宗聖世為七帝門師俗壽一百八僧臘八十三形長九尺四寸垂手過膝目夜發光晝仍不瞬言論清雅動止作則才供二筆凡著述見流傳者四百餘卷云云以國師地位高深解行幽邃力扶大教智燭宏宗縱浩博淵微之學畢一代佛言者賢首之後襲有我師功歸清涼也每歲仲冬諸方咸以賢首忌晨專致讚供諸祖附列而已嘻推功祖德清涼當克獨祭近得甌越的本傳神宗密僧睿二法師拱侍香几冰姿高朗風神超邁巍峩若存覿者畏愛特輪長利覓工傳寫適三月初六日化旦聊陳薄禴雅多同學咸扣余曰盛致肴饌缺如讚章請從屬文貴參古式乃不揆檮昧略伸讚詠傳習華嚴疏鈔祖述清涼章句者推功企恩力行祭享不亦宜乎每位用義龍為稱者賢首初見雲華儼師能設數問皆出意表儼師嗟曰此來義龍輩尚罕扣斯端何計仁賢發明耳目又高僧慧榮自志曰學習三十年不號義龍誓不歸迹後果聲振彌遠又清涼五臺華嚴疏就夢身為龍頭枕南臺尾蟠北臺化多分照而去流通之吉兆也又斐相國奉勑作清涼妙覺塔銘銘曰勑俾圖形相即無相海印大龍蟠居方丈今此以義龍稱耳若考清涼菩薩功德難思義龍何啻初學無疑行者入道場敷具禮三拜互跪秉爐唱云恭以通方妙術終古沖規遍七處九會以常宣具六相十玄而廣說義海之波瀾浩瀚一極唱高教門之詮旨圓融二乘絶聽毛分不移而撗該法界剎那無動而竪貫長時竭性相之洪源徹果因之坦道超衆典比山推於峻嶽攝群經猶川注於窮溟朗金烏奪衆景之光皎玉兔掩餘星之彩幽深匹測祕密難思非下地之能知必上根而可入爰自龍宮選妙鳳闕翻靈雜華爛漫於西乾具葉芬芳於東夏無私駕說五天迓惠於真風不禦弘宣萬國其䨦於法雨圓明主伴代不乏人應感聖凡時新後哲賢首始歌于白雪清涼繼唱于陽春本雄詮開五教之蹊體大法導十宗之徑示形禹族降迹唐朝慕花中瞻蔔之香羡林內旃檀之貴剃除鬚髮拌弃衣簪曠然出三界之家豁爾窹四生之夢辨才天縱學問生知為七帝之門師歷九宗之聖世德雲靉靆名翼翩翻綜緇侶以孤標統僧倫而獨步化緣寂處將花殘柳謝之春能事畢時僅鶯囀燕來之序諱晨旦偶祭享宜陳略聲巴俚之詞聊薦藻蘋之供薄酬法乳微報鴻恩希道眼以洞明冀他心而昭格師資感應水月光臨鑒我虔誠乞垂迃降禮一拜起互跪秉爐請云一心奉請華嚴教海賢首義龍第六祖師清涼尊者三請三拜然後說偈稽首華嚴菩薩海普賢悲願久修心四依德行妙通依五地功熏難勝地三觀已深超解脫十身將證入圓融分形普化寄唐朝說法遍霑生禹族聲震寰中咸軌範名聞世表盡宗師經龍律虎間生才僧統國師曇蕚瑞至此陳白不然則修一疏宣之一心頂禮華嚴教海賢首義龍出胎分慶時身清涼尊者從清涼字和之四依應跡生王族十月形成出聖胎祥瑞希奇動衆心光明煥赫驚鄰室照世星眸藏襁褓懸河海辨擁衣衾善才法爾又童真性德重開珍寶藏故我一心歸命頂禮下皆倣此一心頂禮華嚴教海賢首義龍嬉童入寺時身清涼尊者福擬百童嚴塔像嬉遊衆藝聚泥沙差無白馬詣青山悅有寶林逾雲嶺掃灑六塵求解脫躋攀四智學菩提一周歲曜發靈機三藏微言皆曉達一心頂禮華嚴教海賢首義龍奉恩落䰂時身清涼尊者祝髮染緇除俗態奉恩遵禁入僧倫金刀剪剪緑絲飄玉璽輝輝黃勑鎮窣堵福超功德重周羅髮盡垢塵輕形權心實妙難思便是德雲從定起一心頂禮華嚴教海賢首義龍群經注演時身清涼尊者調理筌遊智刃從容科節鋭詞鋒楞嚴圓覺洞能詮般若涅槃明所解文錦江心垂玉釣義花浪底擲金鈎洪濤本意擷鯨鰲十四輕罾方便設一心頂禮華嚴教海賢首義龍精傳諸論時身清涼尊者宗釋核上革切研咸秉志深探慧學不師心十城封賞健螢窗五日馳名工雪几起信瑜伽親指授因明寶性力師承縱橫九論鼓聲雄剛助肇公談四絶一心頂禮華嚴教海賢首義龍優游觀法時身清涼尊者導達大方窺佛眼澄渟衍行逈禪心蓮花止觀去情遊法界色空亡相入台嶺明明藏智地終山歷歷現心地還源深寂洗塵勞忽證普光平等理一心頂禮華嚴教海賢首義龍圓明衆戒時身清涼尊者本期補特皆成佛才淨尸羅福施生聲聞軌轍究端倪菩薩車秉重控御律悟開遮偏妙處戒登樓閣最高層十弘要平聲誓緊浮囊三聚妍懸寶鑑一心頂禮華嚴教海賢首義龍無名師證時身清涼尊者法界湛然超語迹宗門離念以心傳教窮源本達枝流禪悟𤀹私閏切深參骨髓虗寂觀中空寂趣無名師表離名求洞明說默兩鎔融豈比算沙徒自困一心頂禮華嚴教海賢首義龍聞經能演時身清涼尊者盡詫涅槃心易曉誰醒平聲差別智難明不乘圓滿大因輪曷到汪洋真果海無盡指歸觀掌上難思法術印𮌎中再周能演動詵言法界洪規今在汝一心頂禮華嚴教海賢首義龍五峯祈請時身清涼尊者聖智冥加祈寶積威神與力藉龍尊十年麟筆貫花心五頂鳳箋標月志真侶懇求敷創義法師開拓演新文赤髭白足兩弘真瓶瀉雲興良可喻一心頂禮華嚴教誨賢首義龍通儒助釋時身清涼尊者俗學無裨雖佛誡道儒會釋始通方本操五教作權衡兼握九經為㪷赤道德逍遙莊老志詩書仁義孔顏心四圍章句五明宗十翼百家咸顧習一心頂禮華嚴教海賢首義龍疏成感夢時身清涼尊者法食慶文猶吐鳳傳芳吉兆夢成龍輝空鱗𩮻亘雙臺耀世光明逾皎日奮迅侃梭昭變化分飛雷劒讖流通百川入海味同醎製錦操刀功不淺一心頂禮華嚴教海賢首義龍箋經普化時身清涼尊者五色雲凝天上瑞八方人擁地中仙九州慶溢扇慈風四海遐飛霑法雨絳帳揮松傳百衆黌堂談柄烈千徒名曹大手盡樞衣殉命奔趨求發藥一心頂禮華嚴教海賢首義龍群英雜述時身清涼尊者述義屬文遺輔相摛毫麗藻惠公卿七家貴宦笥珠珍十寺名僧囊錦繡二要五篇三聖觀諸關雙鏡九經圖蟠根聳本雜花功布葉垂陰章句力一心頂禮華嚴教海賢首義龍新經譯贊時身清涼尊者增輝妙理因烏茶聖睿同翻預譯場講贊何煩夢易入聲頭弘通不假仙呼藥花開錦上重重媚雲起長空片片新聖法高談悟帝心國師仍賜清涼號一心頂禮華嚴教海賢首義龍談真歷遇時身清涼尊者壽永九宗天子世德高七帝國王師四方卓犖拜先生三教清英推首坐葵藿心傾光俗諦桑榆日晚暢真猷詩章箋表動嚴宸對御談經欣慶會一心頂禮華嚴教海賢首義龍韜光順寂時身清涼尊者緣盡四心同有滅韜光三月示無常重臣縞素愴賢心皇帝輟朝悽聖意石室葬龕蒙國禮興唐塑貌動天文闍維舌固朵紅蓮舍利數千光色潤至此復跪秉爐運想披陳五悔普為四恩三有法界衆生悉願斷除三障歸命懺悔或運逆順十心於理無爽至心懺悔忽忘廣大毗盧性妄躍無涯苦海津波蕩千華本佛心漚成五蘊衆生相十身妙好拘形殼十智光明墮惑情一法才迷萬法迷一塵暫起諸塵起頓差三德成三毒豈達凡心即聖心十剎常光瞽不窺十方遍說聾無聽雖登毗奈如狂象已屬摩羅若啞羊六相全虧朗智燈十玄鎮缺懸明鏡百非四句增輕謗萬劫千生結重愆我體真空觀慧門全修全性圓融懺懺悔已至心歸命三寶下皆例此至心勸請毛孔微塵容佛處剎那劫海說經時鏡光帝網道場中願轉法輪窮後際至心隨喜十方三世微塵佛八相圓成衆善根六道諸乘行願因隨喜皆修功德海至心回向願學普賢深信解圓修萬行等虗空菩提實際與衆生回向湛然真法界至心發願不捨千輪功德海常持十本大華嚴普招群品剖塵經遍拉衆生刳識藏在果在因能說法居凡居聖善修心即於普眼見遮那不離普賢觀妙德三聖圓融歸當念十身無礙應塵方未來劫剎道場中等願法王稱長子自歸於佛當願衆生體解大道發無上意自歸於法當願衆生深入經藏智慧如海自歸於僧當願衆生統理大衆一切無礙
